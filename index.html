<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI-Driven Crop Single-Cell Biology: Advances and Perspectives</title>
  <style>
    :root {
      --bg: #f8f8f6;
      --paper: #ffffff;
      --paper-soft: #fcfcfa;
      --ink: #1b1b18;
      --ink-soft: #4d4d47;
      --muted: #6f6f67;
      --line: #d9d8d2;
      --line-strong: #bdbcb3;
      --accent: #1f5a96;
      --accent-soft: #eaf1f8;
      --shadow: 0 8px 24px rgba(20, 20, 18, 0.05);
      --radius: 6px;
      --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      --serif: "Georgia", "Times New Roman", "Songti SC", "Noto Serif SC", serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--sans);
      color: var(--ink);
      background: linear-gradient(180deg, #f5f5f2 0%, #f8f8f6 100%);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .wrap {
      max-width: 1380px;
      margin: 0 auto;
      padding: 28px 20px 42px;
    }

    .hero {
      margin-bottom: 18px;
      padding: 22px 0 0;
    }

    .eyebrow {
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .hero h1 {
      margin: 0 0 20px;
      max-width: 980px;
      font-family: var(--serif);
      font-size: clamp(30px, 4vw, 42px);
      font-weight: 700;
      line-height: 1.14;
      letter-spacing: -0.01em;
    }

    /* 横线分隔 */
    .divider {
      border: none;
      border-top: 2px solid var(--ink);
      margin: 0 0 18px 0;
    }

    /* 链接列表 */
    .supplementary-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* 链接项 - 统一图标风格 */
    .supplementary-link {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--paper);
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: var(--shadow);
    }

    .supplementary-link:hover {
      border-color: var(--accent);
      background: var(--accent-soft);
      transform: translateX(4px);
    }

    /* 统一图标容器 */
    .link-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: var(--accent-soft);
      flex-shrink: 0;
    }

    .supplementary-link:hover .link-icon {
      background: var(--accent);
    }

    /* 统一图标样式 - 表格图标 */
    .link-icon svg {
      width: 20px;
      height: 20px;
      color: var(--accent);
    }

    .supplementary-link:hover .link-icon svg {
      color: #ffffff;
    }

    /* 链接文字 */
    .link-text {
      flex: 1;
      font-size: 15px;
      font-weight: 600;
      color: var(--ink);
      line-height: 1.4;
    }

    .supplementary-link:hover .link-text {
      color: var(--accent);
    }

    /* 外部链接箭头 */
    .external-arrow {
      width: 18px;
      height: 18px;
      color: var(--line-strong);
      transition: all 0.2s ease;
    }

    .supplementary-link:hover .external-arrow {
      color: var(--accent);
      transform: translate(2px, -2px);
    }

    .footer-note {
      margin-top: 12px;
      color: var(--muted);
      font-size: 12px;
      text-align: right;
    }

    @media (max-width: 720px) {
      .wrap {
        padding: 18px 12px 28px;
      }

      .hero h1 {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="eyebrow">Supplementary Information</div>
      <h1>AI-Driven Crop Single-Cell Biology: Advances and Perspectives</h1>
    </section>

    <!-- 横线 -->
    <hr class="divider">

    <!-- 补充材料链接 - 新窗口打开 -->
    <div class="supplementary-list">
      
      <!-- Table S1 -->
      <a class="supplementary-link" href="Table_S1.html" target="_blank" rel="noopener noreferrer">
        <div class="link-icon">

            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="3" y1="9" x2="21" y2="9"></line>
            <line x1="9" y1="21" x2="9" y2="9"></line>
          </svg>
        </div>
        <span class="link-text">Supplementary Table 1. Representative Crop Single-Cell Studies</span>
        <!-- 外部链接图标 -->
        <svg class="external-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>

      <!-- Table S2 -->

          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="3" y1="9" x2="21" y2="9"></line>
            <line x1="9" y1="21" x2="9" y2="9"></line>
          </svg>
        </div>
        <span class="link-text">Supplementary Table 2. Representative AI Models for Single-Cell Data Analysis</span>
        <!-- 外部链接图标 -->
        <svg class="external-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
          <polyline points="15 3 21 3 21 9"></polyline>
          <line x1="10" y1="14" x2="21" y2="3"></line>
        </svg>
      </a>

    </div>

    <div class="footer-note"></div>
  </div>
</body>
</html>
